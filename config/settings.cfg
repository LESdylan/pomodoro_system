work_duration=25
break_duration=5
long_break_duration=25
sessions_before_long_break=4
notification_enabled=true

# Notification messages
work_message=Time to focus!
break_message=Time to take a break!
long_break_message=Take a long break!

# Notification sounds (file names in collection_sounds/, without .wav).
# Falls back to system sounds if a file is not found.
work_sound=sci-fi
break_sound=happy_bells
long_break_sound=soft_start

# Overlay prompt (shown on the fullscreen fallback lock)
overlay_prompt=Enter your password to end the break early

# --- Break enforcement -------------------------------------------------------
# How breaks are enforced:
#   hybrid  = real OS session lock when the desktop can auto-unlock, else overlay
#   lock    = always use the OS session lock
#   overlay = always use the fullscreen Qt overlay
break_mode=hybrid

# Hold a systemd sleep inhibitor for the whole break so the machine NEVER suspends
# and background jobs (AI, builds, downloads) keep running while you are away.
inhibit_sleep=true

# Suspend the machine after this many minutes still locked. 0 = never.
# WARNING: suspending pauses ALL processes, so leave at 0 to keep jobs running.
suspend_after_minutes=0

# Re-lock if the user unlocks before the break ends. Leave false so the password
# can be used to come back early when you really need to.
enforce_break=false

# Optional override for the lock step (advanced). Empty = use the built-in
# pomodoro-session.sh helper, which tries loginctl/qdbus/dbus-send/xdg-screensaver.
# lock_command=